<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Web-Console</title>
    <style>
        body { background: #111; color: #eee; font-family: monospace; }
        #consoleOutput { white-space: pre-wrap; border: 1px solid #444; padding: 10px; height: 300px; overflow-y: auto; }
        #consoleInput { width: 100%; padding: 5px; background: #000; color: #0f0; border: none; }
    </style>
</head>
<body>
<h2>Web-Konsole</h2>
<div id="consoleOutput"></div>
<input id="consoleInput" type="text" placeholder="Befehl eingeben...">

<script>
    const input = document.getElementById("consoleInput");
    const output = document.getElementById("consoleOutput");

    // Eingabe: wenn Enter gedrückt wird
    input.addEventListener("keydown", e => {
        if (e.key === "Enter") {
            const command = input.value; // Eingabetext sichern
            fetch("/api/input", { method: "POST", body: command });
            console.log("DEBUG: Eingabe gesendet -> " + command); // JS-Log, nicht System.out
            input.value = ""; // Eingabefeld leeren
        }
    });

    // Ausgabe: alle 1 Sekunde beim Server nach neuen Texten fragen
    setInterval(() => {
        fetch("/api/output")
            .then(r => r.text())
            .then(t => {
                console.log("OUTPUT from server:", JSON.stringify(t));
                if (t.trim().length > 0) {
                    output.textContent += t;
                    output.scrollTop = output.scrollHeight;
                }
            });
    }, 1000);
</script>
</body>
</html>
